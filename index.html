<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Convite de Casamento — Douglas & Ester</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Montserrat:wght@300;400&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --dourado: #b8860b;
      --dourado-claro: #d4af37;
      --marrom: #2c1810;
      --creme: #faf8f5;
      --offwhite: #f5f0e8;
    }

    body {
      min-height: 100vh;
      font-family: 'Montserrat', sans-serif;
      background: linear-gradient(160deg, #1a0f0a 0%, #2c1810 40%, #3d2318 100%);
      color: var(--creme);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      overflow-x: hidden;
    }

    .invite {
      max-width: 520px;
      width: 100%;
      background: linear-gradient(180deg, rgba(250, 248, 245, 0.98) 0%, rgba(245, 240, 232, 0.95) 100%);
      color: var(--marrom);
      border-radius: 4px;
      box-shadow: 0 25px 80px rgba(0,0,0,0.4), 0 0 0 1px rgba(212, 175, 55, 0.2);
      overflow: hidden;
      position: relative;
    }

    .invite::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 4px;
      background: linear-gradient(90deg, transparent, var(--dourado), var(--dourado-claro), var(--dourado), transparent);
      opacity: 0.9;
    }

    .top-ornament {
      text-align: center;
      padding: 2.5rem 2rem 0.5rem;
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.1rem;
      letter-spacing: 0.4em;
      color: var(--dourado);
      text-transform: uppercase;
    }

    .names {
      text-align: center;
      padding: 1rem 2rem 2rem;
      font-family: 'Cormorant Garamond', serif;
    }

    .names h1 {
      font-size: clamp(2rem, 6vw, 3rem);
      font-weight: 600;
      letter-spacing: 0.08em;
      color: var(--marrom);
      line-height: 1.3;
    }

    .names .and {
      font-size: 1.2rem;
      font-weight: 400;
      font-style: italic;
      letter-spacing: 0.3em;
      color: var(--dourado);
      margin: 0.4rem 0;
    }

    .divider {
      width: 80px;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--dourado), transparent);
      margin: 0 auto 1.5rem;
      opacity: 0.8;
    }

    .date-time {
      text-align: center;
      padding: 0 2rem 2rem;
      font-family: 'Montserrat', sans-serif;
      font-weight: 300;
      letter-spacing: 0.15em;
      font-size: 0.95rem;
    }

    .date-time strong {
      font-weight: 400;
      color: var(--marrom);
    }

    .verse-block {
      margin: 2rem 2rem 2.5rem;
      padding: 1.8rem 1.5rem;
      background: rgba(44, 24, 16, 0.06);
      border-left: 3px solid var(--dourado);
      border-radius: 0 6px 6px 0;
    }

    .verse-block p {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.15rem;
      line-height: 1.7;
      font-style: italic;
      color: var(--marrom);
    }

    .verse-block .ref {
      margin-top: 0.6rem;
      font-family: 'Montserrat', sans-serif;
      font-size: 0.8rem;
      font-style: normal;
      letter-spacing: 0.1em;
      color: var(--dourado);
    }

    .bottom-ornament {
      text-align: center;
      padding: 0 2rem 2.5rem;
      font-family: 'Cormorant Garamond', serif;
      font-size: 0.95rem;
      letter-spacing: 0.35em;
      color: var(--dourado);
      text-transform: uppercase;
    }

    @media (max-width: 480px) {
      .invite { margin: 0.5rem; }
      .names h1 { letter-spacing: 0.04em; }
      .verse-block { margin: 1.5rem 1.25rem; padding: 1.25rem; }
    }
  </style>
</head>
<body>
  <div class="invite">
    <p class="top-ornament">Com a bênção de Deus</p>
    <div class="names">
      <h1>Douglas</h1>
      <p class="and">&amp;</p>
      <h1>Ester</h1>
    </div>
    <div class="divider"></div>
    <p class="date-time">
      Convidam para a celebração do seu casamento<br>
      <strong>18 de março de 2026</strong><br>
      às <strong>18h</strong><br>
      <br>
      Rua Ana Piedade, 68 — Lobato<br>
      Salvador — BA
    </p>
    <div class="verse-block">
      <p>“Para que todos vejam e saibam e considerem e juntamente entendam que a mão do Senhor fez isto…”</p>
      <p class="ref">— Isaías 41:20</p>
    </div>
    <p class="bottom-ornament">Sua presença é nossa alegria</p>
  </div>
</body>
</html>
